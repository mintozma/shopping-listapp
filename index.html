<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #eef2f7;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 24px;
    }

    .app {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 24px;
      width: 100%;
      max-width: 960px;
    }

    /* ── 사이드 패널 ── */
    .sidebar {
      background: #3b5bdb;
      border-radius: 16px;
      padding: 32px 24px;
      color: #fff;
      display: flex;
      flex-direction: column;
      gap: 24px;
      height: fit-content;
      position: sticky;
      top: 48px;


      

    }

    .sidebar h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .sidebar p.subtitle {
      font-size: 0.85rem;
      opacity: 0.75;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-group input {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      font-size: 0.95rem;
      background: rgba(255,255,255,0.15);
      color: #fff;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-group input::placeholder { color: rgba(255,255,255,0.55); }
    .input-group input:focus { border-color: rgba(255,255,255,0.8); }

    .input-group button {
      width: 100%;
      padding: 10px;
      background: #fff;
      color: #3b5bdb;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .input-group button:hover {
      background: #e7edff;
    }

    .stat-box {
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.88rem;
    }

    .stat-row .label { opacity: 0.8; }
    .stat-row .value { font-weight: 600; }

    .progress-bar {
      height: 6px;
      background: rgba(255,255,255,0.25);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #fff;
      border-radius: 99px;
      transition: width 0.3s ease;
    }

    .clear-btn {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      border-radius: 8px;
      padding: 9px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
    }

    .clear-btn:hover { background: rgba(255,255,255,0.25); }

    .hint {
      font-size: 0.78rem;
      opacity: 0.55;
      text-align: center;
    }

    /* ── 리스트 패널 ── */
    .main {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
      padding: 32px;
      min-height: 400px;
      display: flex;
      flex-direction: column;
    }

    .main-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .main-header h2 {
      font-size: 1rem;
      color: #4a5568;
      font-weight: 600;
    }

    .filter-tabs {
      display: flex;
      gap: 4px;
    }

    .filter-tabs button {
      background: none;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 0.82rem;
      cursor: pointer;
      color: #718096;
      transition: all 0.15s;
    }

    .filter-tabs button.active {
      background: #3b5bdb;
      border-color: #3b5bdb;
      color: #fff;
    }

    ul { list-style: none; flex: 1; }

    li {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 12px;
      border-radius: 8px;
      transition: background 0.15s;
    }

    li:hover { background: #f7fafc; }
    li + li { border-top: 1px solid #edf2f7; }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #3b5bdb;
      cursor: pointer;
      flex-shrink: 0;
    }

    li .item-text {
      flex: 1;
      font-size: 0.97rem;
      color: #2d3748;
      word-break: break-all;
      transition: color 0.2s;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    li .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    li .delete-btn:hover { color: #e53e3e; background: #fff5f5; }

    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #a0aec0;
      font-size: 0.92rem;
      gap: 8px;
      padding: 40px 0;
    }

    .empty .icon { font-size: 2.5rem; }
  </style>
</head>
<body>
  <div class="app">
    <!-- 사이드바 -->
    <aside class="sidebar">
      <div style="display:flex; flex-direction:column; gap:4px;">
        <h1>쇼핑 리스트</h1>
        <p class="subtitle">오늘의 장보기 목록</p>
      </div>

      <div class="input-group">
        <input type="text" id="itemInput" placeholder="아이템 입력..." />
        <button onclick="addItem()">+ 추가</button>
      </div>

      <div class="stat-box">
        <div class="stat-row">
          <span class="label">전체</span>
          <span class="value" id="totalCount">0개</span>
        </div>
        <div class="stat-row">
          <span class="label">완료</span>
          <span class="value" id="doneCount">0개</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>

      <button class="clear-btn" onclick="clearChecked()">완료 항목 삭제</button>
      <p class="hint">Enter 키로 빠르게 추가</p>
    </aside>

    <!-- 메인 리스트 -->
    <main class="main">
      <div class="main-header">
        <h2 id="listTitle">전체 목록</h2>
        <div class="filter-tabs">
          <button class="active" onclick="setFilter('all', this)">전체</button>
          <button onclick="setFilter('todo', this)">미완료</button>
          <button onclick="setFilter('done', this)">완료</button>
        </div>
      </div>
      <ul id="list"></ul>
      <div class="empty" id="emptyMsg">
        <span class="icon">🛒</span>
        <span>아직 아이템이 없습니다.</span>
      </div>
    </main>
  </div>

  <script>
    const input = document.getElementById('itemInput');
    const list = document.getElementById('list');
    const emptyMsg = document.getElementById('emptyMsg');
    const totalCount = document.getElementById('totalCount');
    const doneCount = document.getElementById('doneCount');
    const progressFill = document.getElementById('progressFill');
    const listTitle = document.getElementById('listTitle');

    let items = JSON.parse(localStorage.getItem('shoppingList') || '[]');
    let filter = 'all';

    function save() {
      localStorage.setItem('shoppingList', JSON.stringify(items));
    }

    function render() {
      const filtered = items.filter(item => {
        if (filter === 'todo') return !item.checked;
        if (filter === 'done') return item.checked;
        return true;
      });

      list.innerHTML = '';
      filtered.forEach((item) => {
        const realIndex = items.indexOf(item);
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = item.checked;
        cb.onchange = () => toggle(realIndex);

        const span = document.createElement('span');
        span.className = 'item-text';
        span.textContent = item.text;

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.textContent = '✕';
        del.title = '삭제';
        del.onclick = () => remove(realIndex);

        li.append(cb, span, del);
        list.appendChild(li);
      });

      const total = items.length;
      const done = items.filter(it => it.checked).length;
      const pct = total === 0 ? 0 : Math.round((done / total) * 100);

      totalCount.textContent = `${total}개`;
      doneCount.textContent = `${done}개`;
      progressFill.style.width = pct + '%';

      const isEmpty = filtered.length === 0;
      emptyMsg.style.display = isEmpty ? 'flex' : 'none';
      list.style.display = isEmpty ? 'none' : 'block';
    }

    function addItem() {
      const text = input.value.trim();
      if (!text) return;
      items.push({ text, checked: false });
      input.value = '';
      save();
      render();
    }

    function toggle(i) {
      items[i].checked = !items[i].checked;
      save();
      render();
    }

    function remove(i) {
      items.splice(i, 1);
      save();
      render();
    }

    function clearChecked() {
      items = items.filter(it => !it.checked);
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-tabs button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const labels = { all: '전체 목록', todo: '미완료 목록', done: '완료 목록' };
      listTitle.textContent = labels[f];
      render();
    }

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    render();
  </script>
</body>
</html>
