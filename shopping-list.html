<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      padding: 32px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4f8ef7;
    }

    .input-row button {
      padding: 10px 18px;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover { background: #3b7de8; }

    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: #718096;
      margin-bottom: 12px;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #e53e3e;
      font-size: 0.82rem;
      cursor: pointer;
      padding: 0;
    }

    .clear-btn:hover { text-decoration: underline; }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 10px;
      border-radius: 8px;
      transition: background 0.15s;
    }

    li:hover { background: #f7fafc; }

    li + li {
      border-top: 1px solid #edf2f7;
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f8ef7;
      cursor: pointer;
      flex-shrink: 0;
    }

    li .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #2d3748;
      word-break: break-all;
      transition: color 0.2s;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    li .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    li .delete-btn:hover {
      color: #e53e3e;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>쇼핑 리스트</h1>
    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." />
      <button onclick="addItem()">추가</button>
    </div>
    <div class="stats">
      <span id="statsText">0개 항목</span>
      <button class="clear-btn" onclick="clearChecked()">완료 항목 삭제</button>
    </div>
    <ul id="list"></ul>
    <p class="empty" id="emptyMsg">아직 아이템이 없습니다.</p>
  </div>

  <script>
    const input = document.getElementById('itemInput');
    const list = document.getElementById('list');
    const emptyMsg = document.getElementById('emptyMsg');
    const statsText = document.getElementById('statsText');

    let items = JSON.parse(localStorage.getItem('shoppingList') || '[]');

    function save() {
      localStorage.setItem('shoppingList', JSON.stringify(items));
    }

    function render() {
      list.innerHTML = '';
      items.forEach((item, i) => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = item.checked;
        cb.onchange = () => toggle(i);

        const span = document.createElement('span');
        span.className = 'item-text';
        span.textContent = item.text;

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.textContent = '✕';
        del.title = '삭제';
        del.onclick = () => remove(i);

        li.append(cb, span, del);
        list.appendChild(li);
      });

      emptyMsg.style.display = items.length === 0 ? 'block' : 'none';

      const total = items.length;
      const done = items.filter(it => it.checked).length;
      statsText.textContent = total === 0 ? '0개 항목' : `${done} / ${total}개 완료`;
    }

    function addItem() {
      const text = input.value.trim();
      if (!text) return;
      items.push({ text, checked: false });
      input.value = '';
      save();
      render();
    }

    function toggle(i) {
      items[i].checked = !items[i].checked;
      save();
      render();
    }

    function remove(i) {
      items.splice(i, 1);
      save();
      render();
    }

    function clearChecked() {
      items = items.filter(it => !it.checked);
      save();
      render();
    }

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    render();
  </script>
</body>
</html>
